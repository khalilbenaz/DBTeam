name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if (-not $v) {
            $ref = "${{ github.ref_name }}"
            $v = $ref.TrimStart('v')
          }
          if (-not $v) { $v = "1.0.0" }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version = $v"

      - name: Publish win-x64
        shell: pwsh
        run: ./scripts/publish.ps1 -Version ${{ steps.ver.outputs.version }} -Runtime win-x64

      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem dist -Recurse | Select-Object FullName, Length

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: DB TEAM ${{ steps.ver.outputs.version }}
          body: |
            ## DB TEAM ${{ steps.ver.outputs.version }}

            Self-contained Windows x64 build. Download the zip, extract, and run `DBTeam.App.exe`.

            See [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/docs/INSTALL.md) and [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: |
            dist/DBTeam-${{ steps.ver.outputs.version }}-win-x64.zip
          draft: false
          prerelease: false

      - name: Upload artifact (manual runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: DBTeam-${{ steps.ver.outputs.version }}-win-x64
          path: dist/DBTeam-${{ steps.ver.outputs.version }}-win-x64.zip
