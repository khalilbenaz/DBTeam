ShortDescription: Professional SQL Server IDE for Windows
Description: |
  DB TEAM is a modular, bilingual (EN/FR) SQL Server IDE for Windows. Features
  include a T-SQL editor with autocomplete/format/F12/snippets, schema & data
  compare with sync script generation, table designer, query profiler with plan
  tree, data generator, HTML documenter, interactive ER diagram, query history,
  administration panel (logins/users/indexes/backup/restore), real-time
  monitoring, CSV import, query builder, git integration, AI assistant (BYO-key),
  and statement-level T-SQL debugger.
